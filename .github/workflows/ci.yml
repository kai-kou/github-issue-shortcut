name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm test

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python3 tools/check_cjk_markdown.py --changed

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      # OAuth ログインフローの E2E（Playwright・モバイルエミュレーション・モック GitHub）。
      # webServer が wrangler dev（ローカル D1・モック GitHub base）とモックを起動する。
      - run: npm run e2e
        env:
          WRANGLER_SEND_METRICS: "false"
