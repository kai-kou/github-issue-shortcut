name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm test

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python3 tools/check_cjk_markdown.py --changed

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      # OAuth ログインフロー + デザインガイドライン + a11y（axe-core）の E2E（Playwright・
      # モバイルエミュレーション・モック GitHub）。webServer が wrangler dev（ローカル D1・
      # モック GitHub base）とモックを起動する。
      - run: npm run e2e
        env:
          WRANGLER_SEND_METRICS: "false"

  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npx wrangler d1 migrations apply DB --local

      # ログイン前トップページの performance / accessibility スコアを Lighthouse で監査する
      # （design-guidelines.md §5「後続導入」の消化・lighthouserc.json で minScore を assert）。
      - uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: "./lighthouserc.json"
          uploadArtifacts: true
          temporaryPublicStorage: true
        env:
          WRANGLER_SEND_METRICS: "false"

  size:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # バンドルサイズ予算（package.json の size-limit）を PR 差分コメントで可視化する。
      # Vite の chunkSizeWarningLimit は warning のみで CI を失敗させないため size-limit で
      # ハード失敗させる（content/research/design-uiux-20260717_deep_research.md §7）。
      # install は上の npm ci 済みのためスキップし、action には build のみ行わせる。
      - uses: andresz1/size-limit-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          skip_step: install
          build_script: build
